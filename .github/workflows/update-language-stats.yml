name: Update Language Stats

# Runs every Monday at 04:00 UTC, or on manual trigger.
# The workflow fetches language data from all public repositories,
# calculates percentages, and commits the updated README.md.
#
# Required secret: none — GITHUB_TOKEN is provided automatically.
# The default GITHUB_TOKEN has read access to public data and
# write access to this repository (needed for the commit step).

on:
  schedule:
    - cron: "0 4 * * 1"   # Every Monday at 04:00 UTC
  workflow_dispatch:        # Manual trigger from the Actions tab
  push:
    branches:
      - main
    paths:
      - ".github/scripts/update_language_stats.py"

permissions:
  contents: write  # Required to commit the updated README.md

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run language stats updater
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: misterAnt92TV
          README_PATH:     README.md
        run: python3 .github/scripts/update_language_stats.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update language stats [skip ci]"
            git push
          fi
